<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>家計簿アプリ (PBL Step3)</title>
</head>
<body>

    <h2>支出登録フォーム</h2>
    <form id="expense-form">
        <div>
            <label for="amount">金額:</label>
            <input type="number" id="amount" placeholder="例: 1000">
        </div>
        <div>
            <label for="category">カテゴリ:</label>
            <select id="category">
                <option value="">選択してください</option>
                <option value="食費">食費</option>
                <option value="日用品">日用品</option>
                <option value="交通費">交通費</option>
                <option value="交際費">交際費</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <div>
            <label for="date">日付:</label>
            <input type="date" id="date">
        </div>
        <button type="submit">登録</button>
    </form>

    <hr>

    <h2>登録された支出の一覧</h2>
    
    <div id="empty-message" style="color: gray;">登録された支出はありません。</div>
    
    <ul id="expense-list"></ul>

    <button id="clear-all-btn" style="margin-top: 20px;">全データをリセット</button>

    <script>
        const expenseForm = document.getElementById('expense-form');
        const amountInput = document.getElementById('amount');
        const categorySelect = document.getElementById('category');
        const dateInput = document.getElementById('date');
        const expenseList = document.getElementById('expense-list');
        const emptyMessage = document.getElementById('empty-message');
        const clearAllBtn = document.getElementById('clear-all-btn');

        // アプリ起動時にLocalStorageからデータを読み込んで表示
        document.addEventListener('DOMContentLoaded', loadExpenses);

        // フォーム送信時のイベントリスナー
        expenseForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const amount = parseInt(amountInput.value, 10);
            const category = categorySelect.value;
            const date = dateInput.value;

            // バリデーション
            if (isNaN(amount) || amount <= 0) {
                alert('エラー：金額は1以上の数値を入力してください。');
                return;
            }
            if (!category) {
                alert('エラー：カテゴリを選択してください。');
                return;
            }
            if (!date) {
                alert('エラー：日付を選択してください。');
                return;
            }

            const newExpense = {
                id: Date.now().toString(), 
                amount: amount,
                category: category,
                date: date
            };

            saveExpense(newExpense);
            addExpenseToDOM(newExpense);
            updateVisibility(); // 表示の切り替え
            expenseForm.reset();
        });

        // 【新規追加】全データリセットボタンのクリックイベント
        clearAllBtn.addEventListener('click', function() {
            // 出力要件：「すべてのデータを消去しますか？」という警告ポップアップ
            const confirmClear = confirm('すべてのデータを消去しますか？');
            if (confirmClear) {
                // LocalStorage内の該当キーのデータを完全に空にする
                localStorage.removeItem('expenses');
                
                // 画面上のリストを空にする
                expenseList.innerHTML = '';
                
                // 表示の切り替え（「データがありません」を表示する）
                updateVisibility();
            }
        });

        // 画面に一件の支出を追加する関数
        function addExpenseToDOM(expense) {
            const li = document.createElement('li');
            li.setAttribute('data-id', expense.id);
            
            const textNode = document.createTextNode(`${expense.date} | ${expense.category} | ${expense.amount}円 `);
            li.appendChild(textNode);

            const deleteButton = document.createElement('button');
            deleteButton.textContent = '削除';
            
            deleteButton.addEventListener('click', function() {
                const confirmDelete = confirm('本当に削除しますか？');
                if (confirmDelete) {
                    deleteExpense(expense.id);
                }
            });

            li.appendChild(deleteButton);
            expenseList.appendChild(li);
        }

        // LocalStorageから全データを取得する関数
        function getExpensesFromStorage() {
            const storedExpenses = localStorage.getItem('expenses');
            return storedExpenses ? JSON.parse(storedExpenses) : [];
        }

        // データをLocalStorageに保存する関数
        function saveExpense(expense) {
            const expenses = getExpensesFromStorage();
            expenses.push(expense);
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        // 指定されたIDのデータを削除する関数
        function deleteExpense(id) {
            let expenses = getExpensesFromStorage();
            expenses = expenses.filter(expense => expense.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));

            const liToRemove = expenseList.querySelector(`[data-id="${id}"]`);
            if (liToRemove) {
                liToRemove.remove();
            }
            updateVisibility(); // 削除後も表示を切り替える
        }

        // 起動時にLocalStorageのデータを全件描画する関数
        function loadExpenses() {
            const expenses = getExpensesFromStorage();
            expenses.forEach(expense => addExpenseToDOM(expense));
            updateVisibility(); // 初回読み込み時の表示切り替え
        }

        // 【新規追加】データの有無に応じて画面の表示・非表示を切り替える関数
        function updateVisibility() {
            const expenses = getExpensesFromStorage();
            if (expenses.length === 0) {
                emptyMessage.style.display = 'block'; // メッセージを表示
                clearAllBtn.style.display = 'none';   // データがないときはリセットボタンを隠す
            } else {
                emptyMessage.style.display = 'none';  // メッセージを隠す
                clearAllBtn.style.display = 'block';  // データがあるときはリセットボタンを出す
            }
        }
    </script>
</body>
</html>
